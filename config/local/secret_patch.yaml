apiVersion: v1
kind: Secret
metadata:
  name: remote-secrets
  namespace: remote-secrets
type: Opaque
stringData:
  APP: "remote-secrets"
  AWS_ACCESS_KEY_ID: "aaa"
  AWS_SECRET_ACCESS_KEY: "secret"
  AWS_REGION: "ap-southeast-2"
  AWS_ENDPOINT_URL: "http://dockerhost:8080"
  TEST_ENV: "true"
  VAULT_ADDR: "http://dockerhost:8200"
