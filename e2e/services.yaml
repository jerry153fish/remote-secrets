version: "3.8"
services:
  vault-server:
    image: vault:1.13.3
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_DEV_ROOT_TOKEN_ID: "vault-plaintext-root-token"
  wiremock:
    image: wiremock/wiremock:3.13.1
    ports:
      - 8080:8080
    volumes:
      - ./wiremock:/home/wiremock
