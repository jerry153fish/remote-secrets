name: Main CI
on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  pull_request:
    branches:
      - "main"
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AWS_REGION: ap-southeast-2
      AWS_ACCESS_KEY_ID: foobar
      AWS_SECRET_ACCESS_KEY: foobar
      AWS_ENDPOINT_URL: http://localhost:4566
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: vault-plaintext-root-token
      CARGO_INCREMENTAL: "0"

    steps:
      - name: Check out repository code
        uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
          cache-on-failure: true

      - name: Start local services
        run: docker compose -f e2e/services.yaml up -d

      - name: Wait for Floci
        run: |
          ./wait-for.sh http://localhost:4566/_floci/init -t 300 -s -- echo 'floci ready'
          make init-test && sleep 2

      - name: Run unit tests
        run: |
          make test

  sanity-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read
    timeout-minutes: 60

    env:
      AWS_REGION: ap-southeast-2
      AWS_ACCESS_KEY_ID: foobar
      AWS_SECRET_ACCESS_KEY: foobar
      AWS_ENDPOINT_URL: http://localhost:4566
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: vault-plaintext-root-token

    steps:
      - name: Check out repository code
        uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: clippy, rustfmt

      - name: Start local services
        run: docker compose -f e2e/services.yaml up -d

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: local
          ignore_failed_clean: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: controller

      # setup Docker buld action
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: controller:local
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/remote-secrets:buildcache-amd64
            type=gha,scope=remote-secrets-amd64
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/remote-secrets:buildcache-amd64,mode=max,ignore-error=true
            type=gha,scope=remote-secrets-amd64,mode=max,ignore-error=true
          push: false
          load: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: controller:local
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

      - name: Setup remote secrets in kind
        run: |
          ./wait-for.sh http://localhost:4566/_floci/init -t 300 -s -- echo 'floci ready'
          make init-test
          make kind-image-load
          make install-local
          kubectl apply -f e2e/dockerhost-linux.yaml

          kubectl wait deployment -n remote-secrets remote-secrets --for condition=Available=True --timeout=180s

          kubectl -n remote-secrets delete pod/floci-check --ignore-not-found=true
          kubectl -n remote-secrets run floci-check --image=curlimages/curl:8.11.1 --restart=Never --command -- curl -fsS http://dockerhost:4566/_floci/init
          kubectl -n remote-secrets wait pod/floci-check --for=jsonpath='{.status.phase}'=Succeeded --timeout=60s
          kubectl -n remote-secrets logs pod/floci-check
          kubectl -n remote-secrets delete pod/floci-check --ignore-not-found=true

      - name: Sanity check remote secrets
        run: |
          kubectl apply -f config/simples/example.yaml
          e2e/integration-test.sh

      - name: Show logs
        if: failure()
        run: |

          kubectl get secret test-rsecret -o yaml || true
          kubectl -n remote-secrets get deploy remote-secrets -o yaml || true
          kubectl -n remote-secrets logs deploy/remote-secrets || true
          docker compose -f e2e/services.yaml logs || true
          kubectl get rsecrets.jerry153fish.com test-rsecret -o yaml || true
          curl -s http://localhost:4566/_floci/init | cat -
          docker compose -f e2e/services.yaml exec -T floci aws ssm get-parameter --name MyStringParameter || true
          docker compose -f e2e/services.yaml exec -T floci aws secretsmanager get-secret-value --secret-id MyTestSecret || true
          docker compose -f e2e/services.yaml exec -T floci aws cloudformation describe-stacks --stack-name MyTestStack || true

  docker-push-amd64:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: ${{ github.event_name != 'pull_request' }}
    environment: main
    needs: [test, sanity-check]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/remote-secrets:sha-${{ github.sha }}-amd64
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/remote-secrets:buildcache-amd64
            type=gha,scope=remote-secrets-amd64
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/remote-secrets:buildcache-amd64,mode=max
            type=gha,scope=remote-secrets-amd64,mode=max,ignore-error=true

  docker-push-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    if: ${{ github.event_name != 'pull_request' }}
    environment: main
    needs: [test, sanity-check]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/remote-secrets:sha-${{ github.sha }}-arm64
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/remote-secrets:buildcache-arm64
            type=gha,scope=remote-secrets-arm64
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/remote-secrets:buildcache-arm64,mode=max
            type=gha,scope=remote-secrets-arm64,mode=max,ignore-error=true

  docker-push-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name != 'pull_request' }}
    environment: main
    needs: [docker-push-amd64, docker-push-arm64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/remote-secrets
          flavor: |
            latest=auto
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          AMD64_IMAGE="ghcr.io/${{ github.repository_owner }}/remote-secrets:sha-${{ github.sha }}-amd64"
          ARM64_IMAGE="ghcr.io/${{ github.repository_owner }}/remote-secrets:sha-${{ github.sha }}-arm64"

          echo "$TAGS" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Creating manifest for $tag"
            docker buildx imagetools create -t "$tag" "$AMD64_IMAGE" "$ARM64_IMAGE"
          done
